name: Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-private-keys:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan for private keys
        run: |
          set -euo pipefail
          pattern='-----BEGIN\s+(RSA|DSA|EC|OPENSSH|PGP)\s+PRIVATE\s+KEY-----'
          if git grep -rEI "$pattern" -- ':!.github/workflows/security.yml'; then
            echo "::error::Private key material detected in tracked files!"
            exit 1
          fi
          echo "No private keys found."
